spring:
  application:
    name: codesy-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codesy}
    username: ${SPRING_DATASOURCE_USERNAME:codesy}
    password: ${SPRING_DATASOURCE_PASSWORD:codesy}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:codesy-execution}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false
  web:
    pageable:
      max-page-size: 100
      default-page-size: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${APP_JWT_SECRET:codesy-local-jwt-secret-key-for-dev-only-1234567890}
    access-expiration: ${APP_JWT_ACCESS_EXPIRATION:PT15M}
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION:P7D}
    refresh-cookie-name: ${APP_JWT_REFRESH_COOKIE_NAME:codesy_refresh_token}
    refresh-cookie-secure: ${APP_JWT_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${APP_JWT_REFRESH_COOKIE_SAME_SITE:Strict}
    refresh-cookie-path: ${APP_JWT_REFRESH_COOKIE_PATH:/api/v1/auth}
  execution:
    dispatch: ${APP_EXECUTION_DISPATCH:local}
    topic: ${APP_EXECUTION_TOPIC:submission-queued}
    outbox-batch-size: ${APP_EXECUTION_OUTBOX_BATCH_SIZE:25}
    producer-enabled: ${APP_EXECUTION_PRODUCER_ENABLED:true}
    worker-enabled: ${APP_EXECUTION_WORKER_ENABLED:true}
    poll-delay: ${APP_EXECUTION_POLL_DELAY:3000}
    sandbox:
      enabled: ${APP_EXECUTION_SANDBOX_ENABLED:false}
      provider: ${APP_EXECUTION_SANDBOX_PROVIDER:docker}
      working-root: ${APP_EXECUTION_SANDBOX_WORKING_ROOT:${java.io.tmpdir}/codesy-sandbox}
      disable-network: ${APP_EXECUTION_SANDBOX_DISABLE_NETWORK:true}
      workspace-prefix: ${APP_EXECUTION_SANDBOX_WORKSPACE_PREFIX:submission}
      container-user: ${APP_EXECUTION_SANDBOX_CONTAINER_USER:sandbox}
      limits:
        compile-timeout: ${APP_EXECUTION_SANDBOX_COMPILE_TIMEOUT:PT10S}
        run-timeout: ${APP_EXECUTION_SANDBOX_RUN_TIMEOUT:PT2S}
        memory-limit-mb: ${APP_EXECUTION_SANDBOX_MEMORY_LIMIT_MB:256}
        max-processes: ${APP_EXECUTION_SANDBOX_MAX_PROCESSES:64}
        max-output-kb: ${APP_EXECUTION_SANDBOX_MAX_OUTPUT_KB:512}
        max-source-kb: ${APP_EXECUTION_SANDBOX_MAX_SOURCE_KB:128}
      images:
        java-21: ${APP_EXECUTION_SANDBOX_JAVA_21_IMAGE:codesy/sandbox-java:latest}
        python-3: ${APP_EXECUTION_SANDBOX_PYTHON_3_IMAGE:codesy/sandbox-python:latest}
        cpp-17: ${APP_EXECUTION_SANDBOX_CPP_17_IMAGE:codesy/sandbox-cpp:latest}
    guardrails:
      enabled: ${APP_EXECUTION_GUARDRAILS_ENABLED:true}
      max-in-flight-per-user: ${APP_EXECUTION_MAX_IN_FLIGHT_PER_USER:3}
      max-queued-submissions: ${APP_EXECUTION_MAX_QUEUED_SUBMISSIONS:200}
      max-running-submissions: ${APP_EXECUTION_MAX_RUNNING_SUBMISSIONS:50}
      max-pending-outbox-events: ${APP_EXECUTION_MAX_PENDING_OUTBOX_EVENTS:200}
      rate-limit:
        enabled: ${APP_EXECUTION_RATE_LIMIT_ENABLED:true}
        trust-forwarded-headers: ${APP_EXECUTION_TRUST_FORWARDED_HEADERS:false}
        user-window: ${APP_EXECUTION_USER_RATE_LIMIT_WINDOW:PT1M}
        max-submissions-per-user: ${APP_EXECUTION_MAX_SUBMISSIONS_PER_USER:10}
        ip-window: ${APP_EXECUTION_IP_RATE_LIMIT_WINDOW:PT1M}
        max-submissions-per-ip: ${APP_EXECUTION_MAX_SUBMISSIONS_PER_IP:30}

logging:
  pattern:
    level: "%5p [%X{correlationId:-na}]"