services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: codesy
      POSTGRES_USER: codesy
      POSTGRES_PASSWORD: codesy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesy -d codesy"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "codesy-redis-dev"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "codesy-redis-dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/confluent-local:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox-python:
    image: codesy/sandbox-python:latest
    build:
      context: .
      dockerfile: sandbox/python/Dockerfile
    profiles:
      - sandboxes

  sandbox-java:
    image: codesy/sandbox-java:latest
    build:
      context: .
      dockerfile: sandbox/java/Dockerfile
    profiles:
      - sandboxes

  sandbox-cpp:
    image: codesy/sandbox-cpp:latest
    build:
      context: .
      dockerfile: sandbox/cpp/Dockerfile
    profiles:
      - sandboxes

volumes:
  postgres-data:
  redis-data:
  kafka-data: