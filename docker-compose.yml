services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: codesy
      POSTGRES_USER: codesy
      POSTGRES_PASSWORD: codesy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codesy -d codesy"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"